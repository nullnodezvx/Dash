<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#030304">
<title>Zeca</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>
<style>
:root {
  --text-primary: #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary: #76746E;
  --success: #6BE3A4;
  --warning: #F2C063;
  --danger: #FF6B6B;
  --font: 'Montserrat', -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
  --font-mono: 'Montserrat', ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  --radius-card: 20px;
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: #030304;
  color: var(--text-secondary);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  -webkit-text-size-adjust: 100%;
}
body {
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
  padding: 0 max(20px, env(safe-area-inset-right)) 60px max(20px, env(safe-area-inset-left));
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(circle at 82% 14%, rgba(224, 118, 88, 0.20), transparent 45%),
    radial-gradient(circle at 18% 90%, rgba(107, 227, 164, 0.06), transparent 50%),
    radial-gradient(circle at 50% 60%, rgba(100, 80, 200, 0.04), transparent 55%);
  filter: blur(40px);
  pointer-events: none;
  z-index: -2;
  animation: drift 36s ease-in-out infinite alternate;
}
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.012) 1px, transparent 1px);
  background-size: 3px 3px;
  pointer-events: none;
  z-index: -1;
}
@keyframes drift {
  0%   { transform: translate3d(0,0,0); }
  100% { transform: translate3d(-22px, 14px, 0); }
}

/* ===== Page load staggered animations ===== */
@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}
.pf1 { animation: fadeSlideUp 0.6s cubic-bezier(0.22,1,0.36,1) 0.05s both; }
.pf2 { animation: fadeSlideUp 0.6s cubic-bezier(0.22,1,0.36,1) 0.15s both; }
.pf3 { animation: fadeSlideUp 0.6s cubic-bezier(0.22,1,0.36,1) 0.25s both; }
.pf4 { animation: fadeSlideUp 0.6s cubic-bezier(0.22,1,0.36,1) 0.35s both; }

.page { max-width: 1100px; margin: 0 auto; padding-top: 20px; }

/* ===== Page title ===== */
.dash-title {
  margin: 0 0 14px;
  font-size: 30px;
  font-weight: 800;
  letter-spacing: -0.035em;
  background: linear-gradient(160deg, #FFFFFF 0%, #909088 120%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  color: transparent;
}
@media (max-width: 480px) { .dash-title { font-size: 24px; } }

/* ===== Goal Ticker ===== */
.ticker-row { display: grid; grid-template-columns: 1fr; gap: 4px; margin-bottom: 18px; }
.goal-ticker {
  position: relative; overflow: hidden;
  display: flex; align-items: center; gap: 10px;
  padding: 9px 14px;
  border-radius: 14px;
  background:
    linear-gradient(180deg, rgba(0,0,0,0.52) 0%, rgba(0,0,0,0.36) 100%),
    repeating-linear-gradient(0deg, rgba(255,255,255,0.018) 0, rgba(255,255,255,0.018) 1px, transparent 1px, transparent 3px);
  border: 1px solid rgba(107,227,164,0.14);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 0 24px rgba(107,227,164,0.06);
}
.goal-ticker::after {
  content: '';
  position: absolute; top: 0; bottom: 0; width: 30%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
  pointer-events: none;
  animation: ticker-sweep 8s linear infinite;
}
@keyframes ticker-sweep { 0% { left: -40%; } 100% { left: 110%; } }
.goal-ticker-led { display: inline-flex; align-items: center; }
.goal-ticker-led-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #6BE3A4;
  box-shadow: 0 0 10px rgba(107,227,164,0.85);
  animation: led-pulse 1.6s ease-in-out infinite;
}
@keyframes led-pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%      { opacity: 0.4; transform: scale(0.82); }
}
.goal-ticker-label {
  font-family: var(--font-mono); font-size: 9.5px; font-weight: 800;
  letter-spacing: 0.20em; color: var(--text-tertiary);
}
.goal-ticker-stage { position: relative; overflow: hidden; flex: 1; height: 22px; }
.goal-ticker-row {
  position: absolute; inset: 0;
  display: flex; align-items: center; gap: 8px;
  font-family: var(--font-mono); font-size: 12.5px; font-weight: 600;
  font-variant-numeric: tabular-nums; color: var(--text-primary); white-space: nowrap;
  opacity: 1;
  transition: opacity 0.22s ease;
}
.goal-ticker-row.is-fading { opacity: 0; }
.goal-ticker-status { display: inline-flex; justify-content: center; width: 18px; color: var(--text-tertiary); }
.goal-ticker-status[data-status="done"]    { color: var(--success); }
.goal-ticker-status[data-status="pending"] { color: var(--text-tertiary); }
.goal-ticker-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.goal-ticker-meta {
  font-family: var(--font-mono); font-size: 11px; font-weight: 700;
  font-variant-numeric: tabular-nums; letter-spacing: 0.04em;
  color: var(--text-secondary); padding: 3px 8px; border-radius: 999px;
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.07);
}

/* ===== Day Ring — Premium multi-ring ===== */
.day-ring-wrap {
  display: flex; flex-wrap: wrap;
  align-items: center; justify-content: center;
  gap: 28px; padding: 26px; margin-bottom: 22px;
  border-radius: var(--radius-card);
  background: rgba(6, 6, 8, 0.80);
  border: 1px solid rgba(255,255,255,0.07);
  backdrop-filter: blur(32px) saturate(1.4);
  -webkit-backdrop-filter: blur(32px) saturate(1.4);
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.04) inset,
    0 24px 70px rgba(0,0,0,0.60),
    0 0 50px rgba(224,118,88,0.05);
  transition: box-shadow 0.4s ease, border-color 0.4s ease;
}
.day-ring-wrap:hover {
  border-color: rgba(255,255,255,0.10);
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.06) inset,
    0 24px 70px rgba(0,0,0,0.65),
    0 0 70px rgba(224,118,88,0.08);
}
.day-ring { position: relative; width: 210px; height: 210px; flex-shrink: 0; }
.day-ring svg { width: 100%; height: 100%; display: block; }

.day-ring-track-outer { fill: none; stroke: rgba(255,255,255,0.04); stroke-width: 1.5; }
.day-ring-track       { fill: none; stroke: rgba(255,255,255,0.055); stroke-width: 11; }
.day-ring-track-inner { fill: none; stroke: rgba(255,255,255,0.03); stroke-width: 4; }

.day-ring-fill {
  fill: none; stroke-width: 11; stroke-linecap: round;
  transform: rotate(-90deg); transform-origin: 105px 105px;
  transition: stroke-dashoffset 1.3s cubic-bezier(0.22,1,0.36,1),
              stroke 0.7s cubic-bezier(0.22,1,0.36,1);
}
.day-ring-fill-glow {
  fill: none; stroke-width: 22; stroke-linecap: round; opacity: 0.16;
  transform: rotate(-90deg); transform-origin: 105px 105px;
  transition: stroke-dashoffset 1.3s cubic-bezier(0.22,1,0.36,1),
              stroke 0.7s cubic-bezier(0.22,1,0.36,1);
}
.day-ring-fill-inner {
  fill: none; stroke-width: 4; stroke-linecap: round; opacity: 0.30;
  transform: rotate(-90deg); transform-origin: 105px 105px;
  transition: stroke-dashoffset 1.3s cubic-bezier(0.22,1,0.36,1),
              stroke 0.7s cubic-bezier(0.22,1,0.36,1);
}

.day-ring-overlay {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  pointer-events: none;
}
.day-ring-percent {
  font-size: 48px; font-weight: 800;
  font-variant-numeric: tabular-nums; letter-spacing: -0.05em;
  color: var(--text-primary); line-height: 1;
}
.day-ring-phase {
  margin-top: 5px; font-family: var(--font-mono);
  font-size: 8.5px; font-weight: 800;
  letter-spacing: 0.22em; text-transform: uppercase; color: var(--text-tertiary);
}
.day-ring-clock {
  font-family: var(--font-mono); font-size: 10px;
  color: var(--text-tertiary); margin-top: 3px;
}
.day-ring-text { display: flex; flex-direction: column; gap: 6px; max-width: 280px; }
.day-ring-status   { font-size: 14px; font-weight: 700; color: var(--text-primary); }
.day-ring-remaining { font-family: var(--font-mono); font-size: 12px; color: var(--text-secondary); }
.day-ring-hours     { font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); }
@media (max-width: 480px) {
  .day-ring { width: 170px; height: 170px; }
  .day-ring-percent { font-size: 38px; }
  .day-ring-status { font-size: 13px; }
}

/* ===== Section ===== */
.section { margin-top: 8px; }
.section-title {
  font-size: 11.5px; font-weight: 700; letter-spacing: 0.22em;
  text-transform: uppercase; color: var(--text-tertiary);
  display: flex; align-items: center; gap: 12px; margin-bottom: 14px;
}
.section-title::before { content: ''; width: 18px; height: 1px; background: var(--text-tertiary); opacity: 0.5; }
.section-title::after  { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, rgba(255,255,255,0.07), transparent); }

/* ===== Cards ===== */
.gm-card {
  position: relative;
  background: rgba(6, 6, 8, 0.88);
  border-radius: var(--radius-card);
  padding: 22px;
  margin-bottom: 14px;
  border: 1px solid rgba(255,255,255,0.07);
  backdrop-filter: blur(32px) saturate(1.3);
  -webkit-backdrop-filter: blur(32px) saturate(1.3);
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.03) inset,
    0 18px 56px rgba(0,0,0,0.60);
  transition: transform 0.35s cubic-bezier(0.22,1,0.36,1),
              box-shadow 0.35s cubic-bezier(0.22,1,0.36,1),
              border-color 0.35s ease;
  overflow: hidden;
}
.gm-card::before {
  content: '';
  position: absolute; top: 0; left: 14px; right: 14px; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
  pointer-events: none;
}
.gm-card:hover {
  transform: translateY(-3px);
  border-color: rgba(107,227,164,0.15);
  box-shadow:
    0 0 0 1px rgba(107,227,164,0.08) inset,
    0 24px 70px rgba(0,0,0,0.70),
    0 0 40px rgba(107,227,164,0.07);
}
.gm-card.gm-all-done {
  border-color: rgba(107,227,164,0.22);
  box-shadow:
    0 0 0 1px rgba(107,227,164,0.10) inset,
    0 18px 56px rgba(0,0,0,0.60),
    0 0 50px rgba(107,227,164,0.10);
}
.gm-card.gm-all-done::after {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(circle at 50% 0%, rgba(107,227,164,0.13), transparent 62%);
  pointer-events: none;
}
.gm-card.gm-all-done .gm-progress-num,
.gm-card.gm-all-done .gm-progress-label { color: var(--success); }

.gm-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  flex-wrap: wrap; gap: 12px; margin-bottom: 14px; position: relative;
}
.gm-header-left { display: flex; flex-direction: column; }
.gm-eyebrow {
  font-size: 11.5px; font-weight: 700;
  letter-spacing: 0.20em; text-transform: uppercase;
  color: var(--text-tertiary); margin-bottom: 6px;
}
.gm-progress-row { display: flex; align-items: baseline; gap: 6px; }
.gm-progress-num {
  font-size: 42px; font-weight: 700;
  font-variant-numeric: tabular-nums; letter-spacing: -0.045em;
  color: var(--text-primary); line-height: 1;
}
.gm-progress-total { font-family: var(--font-mono); font-size: 18px; color: var(--text-tertiary); }
.gm-progress-label {
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.10em; text-transform: uppercase;
  color: var(--text-tertiary); margin-left: 4px;
}
.gm-tomorrow-sub { font-size: 12px; color: var(--text-tertiary); margin-top: 4px; }
.gm-tomorrow-count {
  font-family: var(--font-mono); font-size: 11px; font-weight: 600;
  font-variant-numeric: tabular-nums; letter-spacing: 0.04em;
  text-transform: uppercase; color: var(--text-tertiary);
}
.gm-card-tomorrow .gm-progress-row { display: none; }

.gm-streak {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 12px; border-radius: 999px;
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07);
  color: var(--text-tertiary); font-size: 11px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  transition: background 0.25s, color 0.25s, border-color 0.25s, box-shadow 0.25s;
}
.gm-streak-icon { font-size: 13px; }
.gm-streak-num { font-family: var(--font-mono); font-weight: 700; font-variant-numeric: tabular-nums; }
.gm-streak.gm-streak-active {
  background: rgba(242,192,99,0.12); color: #F2C063;
  border-color: rgba(242,192,99,0.35);
  box-shadow: 0 0 20px rgba(242,192,99,0.14);
}
.gm-streak.gm-streak-active .gm-streak-icon { filter: drop-shadow(0 0 8px rgba(242,192,99,0.75)); }

/* Progress bar */
.gm-bar { display: flex; gap: 4px; height: 5px; margin-bottom: 16px; }
.gm-bar:empty { display: none; }
.gm-bar-seg {
  flex: 1; background: rgba(255,255,255,0.06); border-radius: 3px;
  transition: background 0.4s, box-shadow 0.4s;
}
.gm-bar-seg-done { background: #6BE3A4; box-shadow: 0 0 8px rgba(107,227,164,0.50); }

.goal-list { list-style: none; margin: 0; padding: 0; }
.empty-state {
  text-align: center; font-size: 12px; font-style: italic;
  color: var(--text-tertiary); padding: 16px 0;
}

/* List rows */
.gm-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px; margin-bottom: 6px;
  background: rgba(255,255,255,0.028);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 14px;
  transition: background 0.2s, opacity 0.3s, transform 0.2s;
  position: relative;
}
.gm-row:hover { background: rgba(255,255,255,0.055); transform: translateX(2px); }
.gm-row.gm-row-done {
  opacity: 0.40; background: rgba(107,227,164,0.03);
}
.gm-row.gm-row-done .gm-text {
  text-decoration: line-through; text-decoration-color: rgba(255,255,255,0.35);
}
.gm-row.gm-row-queued {
  background: rgba(242,192,99,0.09);
  box-shadow: inset 3px 0 0 0 #F2C063;
  border-color: rgba(242,192,99,0.14);
}
.gm-row.gm-row-queued .gm-text { color: #FFE2A8; }
.gm-row.is-drag-over { border-top: 2px solid #6BE3A4; }
.gm-row.is-queue-flashing { animation: gm-queue-flash 0.48s ease-out; }
@keyframes gm-queue-flash {
  0%   { background: rgba(255,255,255,0.028); transform: scale(1); }
  40%  { background: rgba(242,192,99,0.32); transform: scale(1.015); }
  100% { background: rgba(255,255,255,0.028); transform: scale(1); }
}
.gm-handle {
  width: 14px; flex-shrink: 0; color: var(--text-tertiary);
  font-weight: 700; font-size: 14px; letter-spacing: -2px;
  cursor: grab; opacity: 0; transition: opacity 0.2s; user-select: none;
}
.gm-row:hover .gm-handle { opacity: 1; }
.gm-handle:active { cursor: grabbing; }

.gm-check {
  appearance: none; -webkit-appearance: none;
  width: 22px; height: 22px; flex-shrink: 0; margin: 0;
  border: 1.5px solid rgba(255,255,255,0.18);
  background: rgba(0,0,0,0.32); border-radius: 8px;
  position: relative; cursor: pointer;
  transition: background 0.2s, border-color 0.2s, box-shadow 0.25s;
}
.gm-check:checked {
  background: #6BE3A4; border-color: #6BE3A4;
  box-shadow: 0 0 18px rgba(107,227,164,0.55);
}
.gm-check:checked::after {
  content: ''; position: absolute; left: 6px; top: 2px;
  width: 6px; height: 11px; border: solid #0A0A0B;
  border-width: 0 2.5px 2.5px 0; transform: rotate(45deg);
  animation: gm-check-pop 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes gm-check-pop {
  from { transform: rotate(45deg) scale(0); }
  to   { transform: rotate(45deg) scale(1); }
}
.gm-check:disabled { cursor: not-allowed; opacity: 0.55; }

.gm-text {
  flex: 1; font-size: 14px; color: var(--text-primary);
  cursor: text; outline: none; border-radius: 4px;
  padding: 2px 4px; margin: -2px -4px;
}
.gm-text[contenteditable="true"] {
  outline: 1px solid rgba(107,227,164,0.28);
  background: rgba(0,0,0,0.30);
}

.gm-queue-btn {
  border: 0; background: transparent; color: var(--text-tertiary);
  font-size: 14px; cursor: pointer; padding: 4px 6px; border-radius: 6px;
  opacity: 0.55; transition: opacity 0.2s, color 0.2s, transform 0.1s;
}
.gm-queue-btn:hover { opacity: 1; }
.gm-queue-btn.gm-queue-active {
  color: #F2C063; opacity: 1;
  filter: drop-shadow(0 0 6px rgba(242,192,99,0.72));
}
.gm-queue-btn:disabled { cursor: not-allowed; opacity: 0.3; }

.goal-delete {
  border: 0; background: transparent; color: var(--text-tertiary);
  font-size: 18px; cursor: pointer; padding: 0 4px; opacity: 0.5;
  transition: opacity 0.2s, color 0.2s;
}
.gm-row:hover .goal-delete { opacity: 1; }
.goal-delete:hover { color: var(--danger); }

.gm-show-toggle {
  width: 100%; margin: 6px 0 0; padding: 9px;
  border: 1px dashed rgba(255,255,255,0.10); border-radius: 12px;
  background: transparent; color: var(--text-tertiary); font-family: inherit;
  font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
  cursor: pointer; transition: color 0.2s, border-color 0.2s;
}
.gm-show-toggle:hover { color: var(--text-primary); border-color: rgba(255,255,255,0.20); }

.gm-push-btn {
  width: 100%; margin-top: 14px; padding: 11px;
  border: 1px dashed rgba(242,192,99,0.28); border-radius: 14px;
  background: rgba(242,192,99,0.04); color: rgba(242,192,99,0.70);
  font-family: inherit; font-size: 11px; font-weight: 700;
  letter-spacing: 0.10em; text-transform: uppercase; cursor: pointer;
  transition: color 0.2s, border-color 0.2s, background 0.2s, box-shadow 0.2s;
}
.gm-push-btn:hover {
  color: #F2C063; border-color: rgba(242,192,99,0.50); border-style: solid;
  background: rgba(242,192,99,0.09); box-shadow: 0 0 24px rgba(242,192,99,0.12);
}

.goal-input-wrap.gm-input-wrap {
  display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  margin-top: 14px; padding-top: 14px;
  border-top: 1px solid rgba(255,255,255,0.05);
}
.gm-input {
  flex: 1; min-width: 0; padding: 11px 14px;
  border: 1px solid rgba(255,255,255,0.08); border-radius: 14px;
  background: rgba(0,0,0,0.38); color: var(--text-primary);
  font-family: inherit; font-size: 14px; outline: none;
  transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
}
.gm-input::placeholder { color: var(--text-tertiary); }
.gm-input:focus {
  border-color: rgba(107,227,164,0.32);
  background: rgba(0,0,0,0.48);
  box-shadow: 0 0 0 3px rgba(107,227,164,0.07);
}

.gm-add {
  padding: 11px 20px; border: 0; border-radius: 14px;
  background: linear-gradient(180deg, #FFFFFF 0%, #D5D1C8 100%);
  color: #0A0A0B; font-family: inherit; font-size: 13px; font-weight: 700;
  cursor: pointer;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 2px 8px rgba(0,0,0,0.42), 0 8px 24px rgba(0,0,0,0.30);
  transition: transform 0.15s, filter 0.15s, box-shadow 0.15s;
}
.gm-add:hover {
  filter: brightness(1.08); transform: translateY(-2px);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 4px 14px rgba(0,0,0,0.48), 0 12px 30px rgba(0,0,0,0.34);
}
.gm-add:active { transform: translateY(0); }

.gm-polish {
  padding: 11px 18px; border: 1px solid rgba(255,255,255,0.10); border-radius: 14px;
  background: rgba(255,255,255,0.04); color: var(--text-primary);
  font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer;
  transition: background 0.15s, border-color 0.15s, transform 0.15s;
}

<script>
(function () {
  'use strict';

  // Cola a tua chave Anthropic aqui para ativar ✨ Polir.
  const ANTHROPIC_API_KEY = '';

  const WAKE_HOUR  = 8;
  const SLEEP_HOUR = 24;

  // ---------- storage ----------
  function storeGet(key) {
    try { return JSON.parse(localStorage.getItem(key)); } catch (e) { return null; }
  }
  function storeSet(key, value) {
    try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) {}
    if (typeof key === 'string' && key.indexOf('goals:') === 0) {
      window.dispatchEvent(new CustomEvent('goals-changed'));
    }
  }
  function storeDelete(key) { try { localStorage.removeItem(key); } catch (e) {} }
  function storeListKeys(prefix) {
    const out = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.indexOf(prefix) === 0) out.push(k);
    }
    return out;
  }

  // ---------- datas ----------
  function pad2(n) { return String(n).padStart(2, '0'); }
  function dateToKey(d) { return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate()); }
  function getActiveDateString() {
    const now = new Date();
    if (now.getHours() < 6) {
      const d = new Date(now); d.setDate(d.getDate() - 1); return dateToKey(d);
    }
    return dateToKey(now);
  }
  function getTomorrowDateString() {
    const now = new Date(); const d = new Date(now);
    if (now.getHours() >= 6) d.setDate(d.getDate() + 1);
    return dateToKey(d);
  }
  function formatDate(yyyy_mm_dd) {
    const parts = yyyy_mm_dd.split('-').map(Number);
    const d = new Date(parts[0], parts[1] - 1, parts[2]);
    const wk = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'][d.getDay()];
    const mo = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'][d.getMonth()];
    return wk + ', ' + d.getDate() + ' ' + mo;
  }

  function todayKey()    { return 'goals:' + getActiveDateString(); }
  function tomorrowKey() { return 'goals:' + getTomorrowDateString(); }

  function getGoals(key) { const g = storeGet(key); return Array.isArray(g) ? g : []; }
  function setGoals(key, list) { storeSet(key, list); }

  // ---------- rollover ----------
  function rollover() {
    const todayDateStr = getActiveDateString();
    const todayK = 'goals:' + todayDateStr;
    let today = getGoals(todayK);
    const texts = new Set(today.map(g => g.text));
    storeListKeys('goals:').forEach(k => {
      const dateStr = k.slice('goals:'.length);
      if (dateStr >= todayDateStr) return;
      const old = getGoals(k);
      old.forEach(g => {
        if (!g.done && g.text && !texts.has(g.text)) {
          today.push({ text: g.text, done: false }); texts.add(g.text);
        }
      });
      storeDelete(k);
    });
    setGoals(todayK, today);
  }

  // ---------- streak ----------
  function loadStreak() {
    const s = storeGet('goal_streak_v1');
    if (s && typeof s.count === 'number') return s;
    return { count: 0, lastProcessedDate: '' };
  }
  function saveStreak(s) { storeSet('goal_streak_v1', s); }
  function processStreak() {
    const s = loadStreak();
    const todayDateStr = getActiveDateString();
    const keys = storeListKeys('goals:')
      .map(k => k.slice('goals:'.length))
      .filter(d => d < todayDateStr).sort();
    keys.forEach(dateStr => {
      if (s.lastProcessedDate && dateStr <= s.lastProcessedDate) return;
      const list = getGoals('goals:' + dateStr);
      if (list.length === 0) { /* não quebra o streak em dias vazios */ }
      else if (list.every(g => g.done)) s.count += 1;
      else s.count = 0;
      s.lastProcessedDate = dateStr;
    });
    saveStreak(s);
  }

  // ---------- Ticker ----------
  const tickerStage = document.getElementById('goalTickerStage');
  const tickerMeta  = document.getElementById('goalTickerMeta');
  let cycleIdx = 0;
  let tickerTimer = null;

  function buildTickerItems() {
    const goals = getGoals(todayKey());
    const total = goals.length;
    const done  = goals.filter(g => g.done).length;
    if (total === 0) return { items: [{ status: 'empty', text: 'Sem objetivos para hoje — adiciona um para começar.' }], done, total };
    if (done === total) return { items: [{ status: 'done', text: '✓ Todos os objetivos concluídos — ótimo dia!' }], done, total };
    const items = goals.filter(g => !g.done).map(g => ({ status: 'pending', text: g.text }));
    return { items, done, total };
  }

  function statusGlyph(status) {
    if (status === 'done') return '✓';
    if (status === 'pending') return '○';
    return '·';
  }

  let firstTick = true;
  function tick() {
    const { items, done, total } = buildTickerItems();
    if (cycleIdx >= items.length) cycleIdx = 0;
    const item = items[cycleIdx];
    cycleIdx = (cycleIdx + 1) % items.length;
    tickerMeta.textContent = done + '/' + total;

    let row = tickerStage.querySelector('.goal-ticker-row');
    if (!row) {
      row = document.createElement('div');
      row.className = 'goal-ticker-row';
      row.innerHTML =
        '<span class="goal-ticker-status"></span>' +
        '<span class="goal-ticker-text"></span>';
      tickerStage.appendChild(row);
    }

    const statusEl = row.querySelector('.goal-ticker-status');
    const textEl   = row.querySelector('.goal-ticker-text');

    const apply = () => {
      statusEl.setAttribute('data-status', item.status);
      statusEl.textContent = statusGlyph(item.status);
      textEl.textContent = item.text;
      row.classList.remove('is-fading');
    };

    if (firstTick) { apply(); firstTick = false; return; }
    row.classList.add('is-fading');
    setTimeout(apply, 220);
  }

  function startTicker() {
    tick();
    if (tickerTimer) clearInterval(tickerTimer);
    tickerTimer = setInterval(tick, 5000);
  }

  window.addEventListener('goals-changed', () => { cycleIdx = 0; tick(); });

  // ---------- Anel do Dia — marcas de tempo ----------
  function buildRingTicks() {
    const ticksEl = document.getElementById('dayRingTicks');
    if (!ticksEl) return;
    const cx = 105, cy = 105, numTicks = 48;
    for (let i = 0; i < numTicks; i++) {
      const angle = (i / numTicks) * Math.PI * 2 - Math.PI / 2;
      const isLong = i % 4 === 0;
      const r1 = isLong ? 90 : 93;
      const r2 = 97;
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', (cx + r1 * Math.cos(angle)).toFixed(2));
      line.setAttribute('y1', (cy + r1 * Math.sin(angle)).toFixed(2));
      line.setAttribute('x2', (cx + r2 * Math.cos(angle)).toFixed(2));
      line.setAttribute('y2', (cy + r2 * Math.sin(angle)).toFixed(2));
      line.setAttribute('stroke', isLong ? 'rgba(255,255,255,0.20)' : 'rgba(255,255,255,0.08)');
      line.setAttribute('stroke-width', isLong ? '1.8' : '0.9');
      line.setAttribute('stroke-linecap', 'round');
      ticksEl.appendChild(line);
    }
  }

  // ---------- Paleta de cores ----------
  const PALETTE = [
    [0,    [255, 216, 158]],
    [12.5, [255, 205, 121]],
    [25,   [255, 227, 143]],
    [37.5, [255, 183, 106]],
    [50,   [255, 149,  89]],
    [62.5, [243, 111,  79]],
    [75,   [226,  93, 122]],
    [87.5, [123,  91, 176]],
    [100,  [ 47,  58, 102]]
  ];
  function lerp(a, b, t) { return a + (b - a) * t; }
  function paletteAt(p) {
    if (p <= PALETTE[0][0]) return PALETTE[0][1];
    if (p >= PALETTE[PALETTE.length - 1][0]) return PALETTE[PALETTE.length - 1][1];
    for (let i = 0; i < PALETTE.length - 1; i++) {
      const [p0, c0] = PALETTE[i]; const [p1, c1] = PALETTE[i + 1];
      if (p >= p0 && p <= p1) {
        const t = (p - p0) / (p1 - p0);
        return [lerp(c0[0],c1[0],t), lerp(c0[1],c1[1],t), lerp(c0[2],c1[2],t)];
      }
    }
    return [255,255,255];
  }
  function rgb(c) { return 'rgb(' + Math.round(c[0]) + ',' + Math.round(c[1]) + ',' + Math.round(c[2]) + ')'; }

  function formatClock(d) { return pad2(d.getHours()) + ':' + pad2(d.getMinutes()); }
  function formatRemaining(totalMin) {
    const h = Math.floor(totalMin / 60);
    const m = Math.floor(totalMin % 60);
    return h + 'h ' + m + 'min';
  }

  const R_MAIN  = 86;
  const R_INNER = 73;
  const C_MAIN  = 2 * Math.PI * R_MAIN;
  const C_INNER = 2 * Math.PI * R_INNER;

  const fillEl      = document.getElementById('dayRingFill');
  const fillGlowEl  = document.getElementById('dayRingFillGlow');
  const fillInnerEl = document.getElementById('dayRingFillInner');

  fillEl.setAttribute('stroke-dasharray', C_MAIN);
  fillEl.setAttribute('stroke-dashoffset', C_MAIN);
  fillGlowEl.setAttribute('stroke-dasharray', C_MAIN);
  fillGlowEl.setAttribute('stroke-dashoffset', C_MAIN);
  fillInnerEl.setAttribute('stroke-dasharray', C_INNER);
  fillInnerEl.setAttribute('stroke-dashoffset', C_INNER);

  function updateDayRing() {
    const now = new Date();
    const hours = now.getHours() + now.getMinutes() / 60 + now.getSeconds() / 3600;
    const percentEl   = document.getElementById('dayRingPercent');
    const phaseEl     = document.getElementById('dayRingPhase');
    const clockEl     = document.getElementById('dayRingClock');
    const statusEl    = document.getElementById('dayRingStatus');
    const remainingEl = document.getElementById('dayRingRemaining');

    clockEl.textContent = formatClock(now);

    if (hours < WAKE_HOUR) {
      fillEl.setAttribute('stroke-dashoffset', C_MAIN);
      fillGlowEl.setAttribute('stroke-dashoffset', C_MAIN);
      fillInnerEl.setAttribute('stroke-dashoffset', C_INNER);
      const dormColor = '#4D4B47';
      fillEl.style.stroke      = dormColor;
      fillGlowEl.style.stroke  = dormColor;
      fillInnerEl.style.stroke = dormColor;
      percentEl.textContent = '—';
      phaseEl.textContent   = 'A DORMIR';
      statusEl.textContent  = '😴 A dormir ainda';
      const minsUntil = (WAKE_HOUR - hours) * 60;
      remainingEl.textContent = formatRemaining(minsUntil) + ' até acordar';
      return;
    }

    if (hours >= SLEEP_HOUR) {
      const c = '#E25D7A';
      fillEl.setAttribute('stroke-dashoffset', 0);
      fillGlowEl.setAttribute('stroke-dashoffset', 0);
      fillInnerEl.setAttribute('stroke-dashoffset', 0);
      fillEl.style.stroke      = c;
      fillGlowEl.style.stroke  = c;
      fillInnerEl.style.stroke = c;
      percentEl.textContent = '100%';
      phaseEl.textContent   = 'HORA PASSADA';
      statusEl.textContent  = '⚠️ Hora de dormir';
      remainingEl.textContent = 'Vai dormir!';
      return;
    }

    const span = SLEEP_HOUR - WAKE_HOUR;
    const percent = (hours - WAKE_HOUR) / span * 100;
    const colorStr = rgb(paletteAt(percent));

    fillEl.setAttribute('stroke-dashoffset', C_MAIN * (1 - percent / 100));
    fillEl.style.stroke = colorStr;
    fillGlowEl.setAttribute('stroke-dashoffset', C_MAIN * (1 - percent / 100));
    fillGlowEl.style.stroke = colorStr;
    fillInnerEl.setAttribute('stroke-dashoffset', C_INNER * (1 - percent / 100));
    fillInnerEl.style.stroke = colorStr;

    percentEl.textContent = Math.floor(percent) + '%';

    let phase, status;
    if (percent < 25)      { phase = 'MANHÃ';     status = '☀️ Manhã — bom início'; }
    else if (percent < 50) { phase = 'MEIO-DIA';  status = '⚡ Meio-dia — continua'; }
    else if (percent < 75) { phase = 'TARDE';     status = '🔥 Tarde — força mais'; }
    else if (percent < 90) { phase = 'NOITE';     status = '⏳ Noite — a finalizar'; }
    else                   { phase = 'DEITAR';    status = '🌙 Hora de deitar'; }
    phaseEl.textContent  = phase;
    statusEl.textContent = status;

    const minsLeft = (SLEEP_HOUR - hours) * 60;
    remainingEl.textContent = formatRemaining(minsLeft) + ' de vigília';
  }

  // ---------- Edição inline ----------
  function makeInlineEdit(textEl, goals, idx, key, reload) {
    textEl.addEventListener('click', () => {
      if (textEl.getAttribute('contenteditable') === 'true') return;
      const original = textEl.textContent;
      textEl.setAttribute('contenteditable', 'true');
      textEl.focus();
      const range = document.createRange();
      range.selectNodeContents(textEl); range.collapse(false);
      const sel = window.getSelection();
      sel.removeAllRanges(); sel.addRange(range);

      function commit() {
        const next = textEl.textContent.trim();
        textEl.removeAttribute('contenteditable');
        if (next && next !== original) {
          const list = getGoals(key);
          if (list[idx]) { list[idx].text = next; setGoals(key, list); }
          reload();
        } else { textEl.textContent = original; }
      }
      function cancel() {
        textEl.removeAttribute('contenteditable');
        textEl.textContent = original;
      }
      textEl.addEventListener('blur', commit, { once: true });
      textEl.addEventListener('keydown', function onKey(e) {
        if (e.key === 'Enter') { e.preventDefault(); textEl.removeEventListener('keydown', onKey); textEl.blur(); }
        else if (e.key === 'Escape') { e.preventDefault(); textEl.removeEventListener('keydown', onKey); cancel(); }
      });
    });
  }

  function wireDragReorder(row, listEl, key, reload) {
    row.setAttribute('draggable', 'true');
    row.addEventListener('dragstart', (e) => {
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', row.dataset.idx);
    });
    row.addEventListener('dragover', (e) => { e.preventDefault(); row.classList.add('is-drag-over'); });
    row.addEventListener('dragleave', () => row.classList.remove('is-drag-over'));
    row.addEventListener('drop', (e) => {
      e.preventDefault(); row.classList.remove('is-drag-over');
      const from = parseInt(e.dataTransfer.getData('text/plain'), 10);
      const to   = parseInt(row.dataset.idx, 10);
      if (isNaN(from) || isNaN(to) || from === to) return;
      const list = getGoals(key);
      const [moved] = list.splice(from, 1);
      list.splice(to, 0, moved);
      setGoals(key, list); reload();
    });
  }

  function buildGoalRow(goal, idx, key, readOnly, reload) {
    const li = document.createElement('li');
    li.className = 'gm-row'; li.dataset.idx = String(idx);
    if (goal.done)   li.classList.add('gm-row-done');
    if (goal.queued) li.classList.add('gm-row-queued');

    const handle = document.createElement('span');
    handle.className = 'gm-handle'; handle.textContent = '⋮⋮';
    li.appendChild(handle);

    const cb = document.createElement('input');
    cb.type = 'checkbox'; cb.className = 'gm-check'; cb.checked = !!goal.done;
    if (readOnly) { cb.disabled = true; cb.title = 'Ativa às 6h de amanhã'; }
    cb.addEventListener('change', () => {
      const list = getGoals(key);
      if (!list[idx]) return;
      list[idx].done = cb.checked;
      if (cb.checked) list[idx].doneAt = Date.now();
      else delete list[idx].doneAt;
      setGoals(key, list); reload();
    });
    li.appendChild(cb);

    const text = document.createElement('span');
    text.className = 'gm-text'; text.textContent = goal.text;
    li.appendChild(text);
    makeInlineEdit(text, null, idx, key, reload);

    const queueBtn = document.createElement('button');
    queueBtn.type = 'button';
    queueBtn.className = 'gm-queue-btn' + (goal.queued ? ' gm-queue-active' : '');
    queueBtn.textContent = '⚡';
    queueBtn.title = 'Fila de produtividade';
    if (readOnly) queueBtn.disabled = true;
    queueBtn.addEventListener('click', () => {
      const list = getGoals(key);
      if (!list[idx]) return;
      list[idx].queued = !list[idx].queued;
      setGoals(key, list);
      li.classList.add('is-queue-flashing');
      setTimeout(reload, 480);
    });
    li.appendChild(queueBtn);

    const del = document.createElement('button');
    del.type = 'button'; del.className = 'goal-delete';
    del.setAttribute('aria-label', 'Apagar objetivo');
    del.textContent = '×';
    del.addEventListener('click', () => {
      const list = getGoals(key);
      list.splice(idx, 1);
      setGoals(key, list); reload();
    });
    li.appendChild(del);

    wireDragReorder(li, null, key, reload);
    return li;
  }

  // ---------- Renderização ----------
  function renderTodayHeader() {
    const goals = getGoals(todayKey());
    const total = goals.length;
    const done  = goals.filter(g => g.done).length;
    document.getElementById('gmProgressNum').textContent   = done;
    document.getElementById('gmProgressTotal').textContent = '/ ' + total;
    const label = document.getElementById('gmProgressLabel');
    if (total === 0)         label.textContent = 'sem objetivos';
    else if (done === total) label.textContent = 'tudo feito — ótimo dia!';
    else                     label.textContent = 'completo';

    document.getElementById('todayLabel').textContent = 'Hoje — ' + formatDate(getActiveDateString());

    const bar = document.getElementById('gmBar');
    bar.innerHTML = '';
    goals.forEach(g => {
      const seg = document.createElement('div');
      seg.className = 'gm-bar-seg' + (g.done ? ' gm-bar-seg-done' : '');
      bar.appendChild(seg);
    });

    const card = document.getElementById('gmCardToday');
    card.classList.toggle('gm-all-done', total > 0 && done === total);

    const pushBtn = document.getElementById('gmPushBtn');
    pushBtn.style.display = (total > 0 && done < total) ? 'block' : 'none';
  }

  function renderStreak() {
    const s = loadStreak();
    document.getElementById('gmStreakNum').textContent = s.count;
    document.getElementById('gmStreak').classList.toggle('gm-streak-active', s.count > 0);
  }

  function renderTomorrowCount() {
    const list = getGoals(tomorrowKey());
    const n = list.length;
    document.getElementById('gmTomorrowCount').textContent = n + (n === 1 ? ' planeado' : ' planeados');
    document.getElementById('tomorrowLabel').textContent = 'Planear amanhã — ' + formatDate(getTomorrowDateString());
  }

  function renderListInto(goals, listEl, emptyEl, key, readOnly) {
    listEl.innerHTML = '';
    emptyEl.style.display = goals.length === 0 ? 'block' : 'none';
    const reload = () => (key === todayKey() ? loadToday() : loadTomorrow());

    const visible = goals.length > 5 ? goals.slice(0, 5) : goals;
    visible.forEach((g, i) => listEl.appendChild(buildGoalRow(g, i, key, readOnly, reload)));

    if (goals.length > 5) {
      let expanded = false;
      const toggle = document.createElement('button');
      toggle.type = 'button'; toggle.className = 'gm-show-toggle';
      const updateLabel = () => {
        toggle.textContent = expanded
          ? 'Mostrar menos ▴'
          : ('Mostrar mais ' + (goals.length - 5) + ' ▾');
      };
      updateLabel();
      toggle.addEventListener('click', () => {
        expanded = !expanded;
        if (expanded) {
          goals.slice(5).forEach((g, i) => {
            const row = buildGoalRow(g, i + 5, key, readOnly, reload);
            listEl.insertBefore(row, toggle);
          });
        } else {
          Array.from(listEl.querySelectorAll('.gm-row')).slice(5).forEach(r => r.remove());
        }
        updateLabel();
      });
      listEl.appendChild(toggle);
    }

    if (key === todayKey()) renderTodayHeader();
    else                    renderTomorrowCount();
  }

  function loadToday() {
    const goals = getGoals(todayKey());
    renderListInto(goals,
      document.getElementById('goalList'),
      document.getElementById('emptyState'),
      todayKey(), false);
  }
  function loadTomorrow() {
    const goals = getGoals(tomorrowKey());
    renderListInto(goals,
      document.getElementById('tomorrowList'),
      document.getElementById('tomorrowEmpty'),
      tomorrowKey(), true);
  }

  // ---------- Passar para amanhã ----------
  document.getElementById('gmPushBtn').addEventListener('click', () => {
    const today     = getGoals(todayKey());
    const remaining = today.filter(g => !g.done);
    if (remaining.length === 0) return;
    const n = remaining.length;
    if (!confirm('Mover ' + n + ' objetivo' + (n === 1 ? '' : 's') + ' não concluído' + (n === 1 ? '' : 's') + ' para amanhã?')) return;
    const tomorrow = getGoals(tomorrowKey());
    const seen = new Set(tomorrow.map(g => g.text));
    remaining.forEach(g => {
      if (!seen.has(g.text)) { tomorrow.push({ text: g.text, done: false }); seen.add(g.text); }
    });
    setGoals(tomorrowKey(), tomorrow);
    setGoals(todayKey(), today.filter(g => g.done));
    loadToday(); loadTomorrow();
  });

  // ---------- Adicionar + Polir ----------
  function showStatus(el, message, isError) {
    el.textContent = message;
    el.classList.toggle('gm-status-error', !!isError);
    clearTimeout(el._t);
    el._t = setTimeout(() => { el.textContent = ''; el.classList.remove('gm-status-error'); }, 3500);
  }

  async function polishOne(text) {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': ANTHROPIC_API_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content:
            'Rewrite this goal so it is concrete, action-oriented, and under 60 characters. ' +
            'Keep the same language as the input. ' +
            'Return ONLY a JSON array with exactly one string, no preamble, no code fences.\n\nGoal: ' + text
        }]
      })
    });
    const data = await res.json();
    const content = (data && data.content && data.content[0] && data.content[0].text) || '';
    const arr = JSON.parse(content);
    if (!Array.isArray(arr) || arr.length < 1 || typeof arr[0] !== 'string') throw new Error('bad response');
    return arr[0].trim();
  }

  function makeAddHandlers(input, addBtn, polishBtn, key, statusEl, reload) {
    function plainAdd(text) {
      const list = getGoals(key);
      list.push({ text, done: false });
      setGoals(key, list);
      input.value = '';
      reload();
    }
    addBtn.addEventListener('click', () => {
      const text = input.value.trim(); if (!text) return; plainAdd(text);
    });
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); addBtn.click(); }
    });
    polishBtn.addEventListener('click', async () => {
      const text = input.value.trim(); if (!text) return;
      if (!ANTHROPIC_API_KEY) {
        plainAdd(text);
        showStatus(statusEl, 'Polir precisa de chave API Anthropic — adicionado como escrito.', false);
        return;
      }
      polishBtn.disabled = true;
      try {
        const polished = await polishOne(text);
        plainAdd(polished);
      } catch (e) {
        plainAdd(text);
        showStatus(statusEl, 'Polir falhou — adicionado como escrito.', true);
      } finally {
        polishBtn.disabled = false;
      }
    });
  }

  makeAddHandlers(
    document.getElementById('goalInput'),
    document.getElementById('goalAddBtn'),
    document.getElementById('goalPolishBtn'),
    todayKey(),
    document.getElementById('polishStatus'),
    loadToday
  );
  makeAddHandlers(
    document.getElementById('tomorrowInput'),
    document.getElementById('tomorrowAddBtn'),
    document.getElementById('tomorrowPolishBtn'),
    tomorrowKey(),
    document.getElementById('tomorrowStatus'),
    loadTomorrow
  );

  // ---------- Arranque ----------
  buildRingTicks();
  rollover();
  processStreak();
  loadToday();
  loadTomorrow();
  renderStreak();
  updateDayRing();
  setInterval(updateDayRing, 60 * 1000);
  startTicker();

  window.addEventListener('storage', () => { loadToday(); loadTomorrow(); renderStreak(); });
})();
</script>
<script>
document.addEventListener('DOMContentLoaded', function () {
  if (typeof initCloudSync !== 'function') return;
  initCloudSync({
    appKey: 'goals',
    syncedPrefixes: ['goals:'],
    onApplied: function () {
      window.dispatchEvent(new CustomEvent('goals-changed'));
      window.dispatchEvent(new Event('storage'));
    }
  });
});
</script>
</body>
